name: "Secret Scanning & Credential Leak Detection"

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for thorough scanning

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.88.22
        with:
          extra_args: >
            --only-verified
            --fail
          github-actions: true

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detect-hardcoded-secrets:
    name: Detect Hard-coded Credentials
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run credential pattern check
        run: bash security/scripts/scan_secrets.sh

  workflow-security-audit:
    name: GitHub Actions Workflow Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Audit workflow files for dangerous patterns
        run: bash security/scripts/audit_workflows.sh
